name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string
      draft:
        description: "Create as draft release"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  checks: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-ci:
    name: Wait for green CI
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI checks to be registered
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sha="${{ github.sha }}"
          repo="${{ github.repository }}"
          pattern='^(Test \(.*\)|Clippy|Format|MSRV \(1\.88\)|Package|Deny|Real-Nu acceptance \(.*\))$'
          echo "Waiting for CI checks to be registered for $sha..."
          for i in $(seq 1 40); do
            names=$(gh api "repos/${repo}/commits/${sha}/check-runs" --jq '.check_runs[].name')
            if echo "$names" | grep -Eq "$pattern"; then
              echo "Found matching checks:"
              echo "$names" | grep -E "$pattern"
              exit 0
            fi
            echo "No matching checks yet (attempt $i/40); sleeping 15s..."
            sleep 15
          done
          echo "::error::Timed out waiting for CI checks to be registered on ${sha}"
          exit 1

      - name: Wait for CI checks on tagged commit
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.sha }}
          repo: ${{ github.repository }}
          wait-interval: 30
          allowed-conclusions: success
          check-regexp: ^(Test \(.*\)|Clippy|Format|MSRV \(1\.88\)|Package|Deny|Real-Nu acceptance \(.*\))$

  preflight:
    name: Release preflight
    needs: [verify-ci]
    if: ${{ !cancelled() && (needs.verify-ci.result == 'success' || needs.verify-ci.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Tests
        run: cargo test --locked
      - name: Package manifest
        run: cargo package --locked

  build:
    name: Build (${{ matrix.target }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: numan
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: numan.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_name: numan
          - os: macos-latest
            target: x86_64-apple-darwin
            bin_name: numan

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            tag="${{ inputs.tag }}"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip "target/${{ matrix.target }}/release/${{ matrix.bin_name }}"

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          artifact="numan-${{ steps.meta.outputs.version }}-${{ matrix.target }}"
          mkdir -p "$artifact"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "$artifact/"
          chmod +x "$artifact/${{ matrix.bin_name }}"
          tar -czf "${artifact}.tar.gz" "$artifact"
          echo "artifact=${artifact}.tar.gz" >> "$GITHUB_ENV"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifact = "numan-${{ steps.meta.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $artifact | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "$artifact/"
          Compress-Archive -Path $artifact -DestinationPath "$artifact.zip" -Force
          echo "artifact=$artifact.zip" >> $env:GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.artifact }}
          retention-days: 3

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum numan-* > SHA256SUMS
          cat SHA256SUMS

      - name: Prepare release notes from CHANGELOG
        run: bash scripts/release-notes-from-changelog.sh "${{ steps.meta.outputs.tag }}" > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft }}
          generate_release_notes: false
          body_path: release-notes.md
          files: dist/*

  publish-crate:
    name: Publish to crates.io
    needs: [preflight, release]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
