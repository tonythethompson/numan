name: Cline PR Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

concurrency:
  group: cline-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  cline-pr-review:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Cline CLI
        run: npm install -g cline@latest

      - name: Verify Cline CLI
        run: cline version

      - name: Configure ClinePass
        run: |
          cline auth --provider cline-pass \
            --apikey "${{ secrets.CLINE_API_KEY }}" \
            --modelid cline-pass/qwen3.7-max

      - name: Get PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Review PR with Cline (ClinePass)
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          GITHUB_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          CLINE_COMMAND_PERMISSIONS: |
            {
              "allow": [
                "gh pr diff *",
                "gh pr view *",
                "gh pr checks *",
                "gh pr list *",
                "gh issue list *",
                "gh issue view *",
                "git log *",
                "git show *",
                "cat *",
                "rg *",
                "grep *",
                "gh pr comment *",
                "gh api repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.number }}/comments *",
                "gh api repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.number }}/reviews *"
              ]
            }
        run: |
          cline --auto-approve true --timeout 2400 'You are an automated GitHub PR reviewer for the Numan Rust repository. Review like GitHub Codex: post inline PR review comments on changed lines with P0-P3 severity.

          PR: #'"${PR_NUMBER}"'

          ## Required reading (in the checked-out repo)
          - .github/instructions/review.instructions.md
          - AGENTS.md

          ## Gather PR context
          Run these separately (no shell pipes/chaining):
          ```bash
          gh pr view '"${PR_NUMBER}"' --json number,title,body,headRefOid,baseRefName,headRefName,files,additions,deletions
          gh pr diff '"${PR_NUMBER}"'
          gh pr checks '"${PR_NUMBER}"'
          gh api repos/'"${GITHUB_REPO}"'/pulls/'"${PR_NUMBER}"'/comments
          ```

          ## Review goals
          - Flag architecture invariant violations from review.instructions.md (install inert, activate separate, mutation lock, etc.)
          - Flag P0/P1 correctness and security issues on the happy path
          - Flag P2 test/doc gaps tied to the changed behavior
          - Ignore pre-existing issues outside the diff and P3 style nits unless they change meaning

          ## Post results like Codex
          1. Post inline review comments on specific changed lines using the GitHub Reviews API.
          2. Each inline comment must start with a severity badge: **P0**, **P1**, **P2**, or **P3**
          3. Include a concrete fix suggestion.
          4. Use commit_id from headRefOid when posting reviews.

          Example:
          ```bash
          gh api repos/'"${GITHUB_REPO}"'/pulls/'"${PR_NUMBER}"'/reviews \
            -X POST \
            -f commit_id="$(gh pr view '"${PR_NUMBER}"' --json headRefOid -q .headRefOid)" \
            -f event="COMMENT" \
            -f body="" \
            -F comments='"'"'[{"path":"src/example.rs","line":10,"body":"**P1**: ...\n\nSuggested fix: ..."}]'"'"'
          ```

          5. If you found no P0-P2 issues, post one PR comment starting with "Reviewed by Cline (ClinePass)" summarizing what you checked and that no actionable issues were found.

          Do not modify code, push commits, merge the PR, or edit labels.'
